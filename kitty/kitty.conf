# vim:fileencoding=utf-8:foldmethod=marker
include themes/rose-pine.conf

font_family     0xProto Regular
bold_font       0xProto Bold
italic_font     0xProto Italic
bold_italic_font auto

font_size 12.0

# force_ltr no

# Nerd Fonts v3.2.0

symbol_map U+f5d0-U+f60d Flog Symbols

symbol_map U+e000-U+e00a,U+ea60-U+ebeb,U+e0a0-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b1,U+e700-U+e7c5,U+ed00-U+efc1,U+f000-U+f2ff,U+f000-U+f2e0,U+f300-U+f372,U+f400-U+f533,U+f0001-U+f1af0 0xProto Nerd Font

cursor_shape block

mouse_hide_wait -1.0

detect_urls yes

underline_hyperlinks hover

enable_audio_bell no

background_opacity 0.8

shell_integration no-cursor

linux_display_server wayland

map kitty_mod+enter no_op
map cmd+enter       no_op

map kitty_mod+n no_op
map kitty_mod+w no_op
map kitty_mod+d no_op
map shift+cmd+d no_op
map kitty_mod+R no_op
map kitty_mod+H no_op
map kitty_mod+t no_op
