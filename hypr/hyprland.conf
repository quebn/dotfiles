monitor=eDP-1,preferred,auto,1.2
# monitor=HDMI-A-1,preferred,auto,1

xwayland {
    force_zero_scaling = true
}

$terminal = app2unit kitty
$menu = rofi -show drun -run-command "app2unit {cmd}"
$browser = app2unit zen-browser
$google = app2unit chromium
$colorpicker = hyprpicker -a
$webapp = $google --new-window --app

exec-once = [workspace 1 silent] $terminal
exec-once = [workspace 2 silent] $browser

exec-once = systemctl --user start plasma-polkit-agent

source = ~/.config/hypr/theme.conf

input {
    kb_layout = us
    kb_options = caps:escape
    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 to 1.0, 0 means no modification.
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.inactive_border = $surface
    col.active_border   = $highlight_high

    layout = dwindle
    allow_tearing = false

    snap {
        enabled = true
        respect_gaps = true
    }
}

decoration {
    rounding = 12
    rounding_power = 4.0
    dim_strength = .2
    blur {
        enabled = false
        size = 2
        passes = 2
    }
    shadow {
        enabled = false
        color = $highlight_high
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1

    bezier = myBezier,       0.15, 0.9,  0.1,  1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     5,     default
    animation = border,        1,     2.39,  linear
    animation = windows,       1,     1.5,   easeOutQuint
    animation = windowsIn,     1,     1.5,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.5,   linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     2.03,  quick
    animation = layers,        1,     2.81,  easeOutQuint
    animation = layersIn,      1,     3,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1,     myBezier, slide
    animation = zoomFactor,    1,     2,     quick
    # animation = hyprfocusIn,   1,     0.5,   quick
    # animation = hyprfocusOut,  1,     0.5,   quick
}

plugin {
    hyprfocus {
        mode = bounce
        bounce_strength = .98
    }
}

dwindle {
    # pseudotile = yes
    force_split = 2
    preserve_split = yes
}

gestures {
    # workspace_swipe = off
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    font_family = ZxProto, Sans
    splash_font_family = ZxProto, Sans
    force_default_wallpaper = 0
    focus_on_activate = false
    # animate_manual_resizes = true
    # vfr = true
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

binds {
    scroll_event_delay = 0
}

windowrule = match:class class:.* suppressevent, maximize yes

windowrule = match:class ^(xdg-desktop-portal-gtk)$, float yes
windowrule = match:class ^(xdg-desktop-portal-gtk)$, center yes
windowrule = match:class ^(xdg-desktop-portal-gtk)$, size (monitor_w*0.5) (monitor_h*0.5)

windowrule = match:title ^(Open.*Files?|Save.*Files?), float yes
windowrule = match:title ^(Open.*Files?|Save.*Files?), center yes
windowrule = match:class ^(Open.*Files?|Save.*Files?), size (monitor_w*0.5) (monitor_h*0.5)

windowrule = match:class class:^(file_progress)$, float yes
windowrule = match:class class:^(file_progress)$, center yes
windowrule = match:class class:^(file_progress)$, size (monitor_w*0.5) (monitor_h*0.5)

windowrule = match:class class:^(dialog)$, float yes
windowrule = match:class class:^(dialog)$, center yes
windowrule = match:class class:^(dialog)$, size (monitor_w*0.5) (monitor_h*0.5)

windowrule = match:class class:^(confirm)$, float yes
windowrule = match:class class:^(confirm)$, center yes
windowrule = match:class class:^(confirm)$, size (monitor_w*0.5) (window_h*0.5)

windowrule = match:class ^(org.pulseaudio.pavucontrol)$, float yes
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, center yes
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, size (monitor_w*0.5) (monitor_h*0.4)
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, opacity 0.9 override

windowrule = match:title Library, float yes
windowrule = match:title Library, center yes
windowrule = match:title Library, size (monitor_w*0.5) (monitor_h*0.5)

windowrule = match:class ^(nm-connection-editor)$, float yes
windowrule = match:class ^(nm-connection-editor)$, center yes
windowrule = match:class ^(nm-connection-editor)$, size (monitor_w*0.5) (monitor_h*0.4)

windowrule = match:class ^(blueman-manager)$, float yes
windowrule = match:class ^(blueman-manager)$, center yes
windowrule = match:class ^(blueman-manager)$, size (window_w*0.5) (window_h*0.4)
windowrule = match:title ^(Please Confirm...)$, size (window_w*0.5) (window_h*0.5)
windowrule = match:title ^(Please Confirm...)$, center yes

# windowrule {
#     name = "Godot Confirm Box"
#     match:title = ^(Please Confirm...)$
#     size   = (window_w*0.5) (window_h*0.5)
#     center = yes
# }

windowrule {
    name = "Nautilus"
    match:class = ^(org.gnome.Nautilus)$
    float  = yes
    size   = (monitor_w*0.5) (monitor_h*0.6)
    center = yes
}

windowrule {
    name = "Viber"
    match:title = ^(ViberPC)$
    pin    = yes
    float  = yes
    center = yes
    move   = onscreen 100% 0%
    border_size = 0
    no_initial_focus = yes
}

# INFO: restrict apps on a workspace
windowrule = match:class ^(com.viber.Viber)$, workspace 10 silent
windowrule = match:class ^(discord)$, workspace 4 silent
windowrule = match:class ^(spotify)$, workspace 3 silent

# INFO: Opacity
windowrule =  match:class ^(discord|spotify|blueman-manager|org.gnome.Nautilus|org.gnome.Calculator)$, opacity 0.95 override

# INFO: satty
windowrule = match:class com.gabm.satty, float yes
# windowrule = match:class com.gabm.satty, size 800 400
windowrule = match:class com.gabm.satty, size (monitor_w*0.5) (monitor_h*0.6)
# windowrule = match:float yes, center yes

# INFO: aseprite
windowrule = match:class ^(Aseprite)$, tile yes
# INFO: calculator
windowrule = match:title ^(Calculator)$, float yes

windowrule {
    name = "Picture-in-Picture"
    match:title = ^(Picture-in-Picture)$
    float = yes
    pin   = yes
    move  = (monitor_w-window_w-20) (monitor_h-window_h-20)
    border_size = 0
}

windowrule {
    name = "Floating"
    match:float = yes
    size = (window_w*1) (window_h*1)
    border_size = 2
    border_color = $surface_alt
}

windowrule {
    name = "Steam Float"
    match:class = ^(steam)$
    size   = (window_w*1) (window_h*1)
    float  = yes
    center = no
    workspace = 5 silent
}

windowrule {
    name = "Steam Tiled"
    match:title = ^(Steam)$
    tile = yes
}

$mainMod = SUPER

# Scripts
$screenshotEdit = $HOME/.config/hypr/scripts/screenshot_edit.sh
$screenshotFull = $HOME/.config/hypr/scripts/screenshot_full.sh
$powermenu = $HOME/.config/hypr/scripts/powermenu.sh

bind = $mainMod, B, exec, $browser
bind = $mainMod, return, exec, $terminal
bind = $mainMod, space, exec, $menu
bind = $mainMod SHIFT, Q, exec, $powermenu
bind = $mainMod SHIFT, X, killactive,
bind = $mainMod SHIFT, F, fullscreen, # dwindle
bind = $mainMod, F, togglefloating,
bind = $mainMod, E, movetoworkspace, empty
# bind = $mainMod, semicolon, togglesplit
bind = $mainMod, I, exec, $colorpicker
bind = $mainMod, A, exec, $webapp="https://chatgpt.com"
bind = $mainMod, D, exec, $webapp="https://excalidraw.com"
bind = $mainMod, O, togglespecialworkspace

bind = , F11, fullscreen
bind = $mainMod SHIFT, P, exec, hyprctl dispatch focuswindow "title:^(Picture-in-Picture)$"
# Volume and Brightness
# bind = , F2

# Screenshots
bind = $mainMod SHIFT, S, exec, $screenshotFull
bind = , Print, exec, $screenshotFull
bind = $mainMod, Print, exec, $screenshotEdit
bind = $mainMod, S, exec, $screenshotEdit

bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod SHIFT, L, resizeactive, 50 0
bind = $mainMod SHIFT, H, resizeactive, -50 0
bind = $mainMod SHIFT, K, resizeactive, 0 -50
bind = $mainMod SHIFT, J, resizeactive, 0 50
# Example special workspace (scratchpad)
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, bracketleft, workspace,e-1
bind = $mainMod, bracketright, workspace,e+1
bind = $mainMod SHIFT, bracketright, movetoworkspace, e+1
bind = $mainMod SHIFT, bracketleft, movetoworkspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# # Zoom
bind = $mainMod, mouse_down, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 1.5) | if . > 5 then 5 else . end')
bind = $mainMod, mouse_up, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mainMod, escape, exec, hyprctl -q keyword cursor:zoom_factor 1
# bind = $mainMod, mouse_up, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.25) | if . < 1 then 1 else . end')
# bind = $mainMod, z, exec, hyprctl -q keyword cursor:zoom_factor 1
